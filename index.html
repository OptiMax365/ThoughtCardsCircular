</style>
</head>

<script>
function generateId() {
return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
}
const STATE = {
projectId: generateId(),
projectName: 'Untitled',
projectSaved: false,
cards: [],
circularSystems: [],
thoughtCards: [],
panels: [],
topmostCards: [],
deletedTopmostCards: [],
pan: { x: 0, y: 0 },
zoom: 1,
nextId: 1,
nextZ: 10,
panelsVisible: true,
autoShowPanel: false,
oldProjectName: 'Untitled',
folderHandle: null,
folderName: '',
folderProjects: [],
lastUsedColor: '#66bb6a',
};
const THOUGHT_POPUPS = new Map();
let nextPopupId = 1;
let popupHideTimer = null;
let currentActiveSpan = null;
let currentFollowPopupId = null;
let pinnedPopupCount = 0;
function getCenterOfViewport() {
const rect = canvasWrap.getBoundingClientRect();
const centerX = rect.width / 2;
const centerY = rect.height / 2;
const canvasX = (centerX - STATE.pan.x) / STATE.zoom;
const canvasY = (centerY - STATE.pan.y) / STATE.zoom;
return { x: canvasX, y: canvasY };
}
function createThoughtPopup(thought, wordText, card) {
const popupId = nextPopupId++;
const popupState = {
id: popupId,
thoughtId: thought.id,
cardId: card.id,
word: wordText,
pinned: false,
editing: false,
followMode: true,
x: null,
y: null,
w: 380,
h: null,
fontSize: 14,
el: null,
};
THOUGHT_POPUPS.set(popupId, popupState);
renderThoughtPopup(popupState);
return popupId;
}
function renderThoughtPopup(ps) {
const el = document.createElement('div');
el.className = 'thought-popup';
el.dataset.popupId = ps.id;
el.innerHTML = `
<div class="thought-popup-pin-badge" title="Pinned">⬆️</div>
<div class="thought-popup-header" data-drag="true">
<span class="popup-icon">💭</span>
<span class="popup-title-text">Thought</span>
<div class="thought-popup-controls">
<button class="follow-btn active" data-act="follow" title="Auto-follow mode">🎯</button>
<button class="pin-btn" data-act="pin" title="Pin">⬆️</button>
<button class="edit-btn" data-act="edit" title="Edit">✏️</button>
<button class="hide-btn" data-act="hide" title="Close">✕</button>
</div>
</div>
<div class="thought-popup-fontsize">
<label>Font:</label>
<input type="number" data-fontsize value="${ps.fontSize}" min="8" max="48" title="Font size">
<span>px</span>
</div>
<div class="thought-popup-word"></div>
<div class="thought-popup-content"></div>
<div class="thought-popup-edit-area">
<label>✏️ Edit Thought</label>
<textarea placeholder="Type your thought here..."></textarea>
<div class="thought-popup-edit-buttons">
<button class="cancel">✕ Cancel</button>
<button class="save">✓ Save</button>
</div>
</div>
<div class="thought-popup-resize"></div>
`;
document.body.appendChild(el);
ps.el = el;
attachThoughtPopupEvents(ps);
updateThoughtPopupContent(ps);
positionThoughtPopup(ps);
}
function updateThoughtPopupContent(ps) {
const card = STATE.thoughtCards.find(c => c.id === ps.cardId);
if (!card) return;
const thought = card.thoughts.find(t => t.id === ps.thoughtId);
if (!thought) return;
const wordEl = ps.el.querySelector('.thought-popup-word');
const contentEl = ps.el.querySelector('.thought-popup-content');
const editTA = ps.el.querySelector('.thought-popup-edit-area textarea');
wordEl.textContent = ps.word || '(word)';
contentEl.textContent = thought.thought || '(no thought)';
contentEl.style.fontSize = ps.fontSize + 'px';
editTA.value = thought.thought || '';
}
function positionThoughtPopup(ps, targetWordEl = null) {
if (!ps.el) return;
if (ps.followMode && targetWordEl && !ps.pinned) {
const wordRect = targetWordEl.getBoundingClientRect();
const popupW = ps.w || 380;
let left = wordRect.left + (wordRect.width / 2) - (popupW / 2);
left = Math.max(10, Math.min(window.innerWidth - popupW - 10, left));
const top = 50;
ps.el.style.left = left + 'px';
ps.el.style.top = top + 'px';
ps.el.style.width = popupW + 'px';
ps.el.style.transform = 'none';
return;
}
if (ps.pinned) {
const pinnedPopups = Array.from(THOUGHT_POPUPS.values()).filter(p => p.pinned && p.el);
const index = pinnedPopups.indexOf(ps);
const popupW = ps.w || 380;
const gap = 10;
const totalWidth = pinnedPopups.length * popupW + (pinnedPopups.length - 1) * gap;
const startX = Math.max(10, (window.innerWidth - totalWidth) / 2);
const left = startX + index * (popupW + gap);
const top = ps.y !== null ? ps.y : 50;
ps.el.style.left = left + 'px';
ps.el.style.top = top + 'px';
ps.el.style.width = popupW + 'px';
ps.el.style.transform = 'none';
return;
}
const baseX = window.innerWidth / 2;
const baseY = 60;
const finalX = ps.x !== null ? ps.x : baseX - (ps.w || 380) / 2;
const finalY = ps.y !== null ? ps.y : baseY;
ps.el.style.left = finalX + 'px';
ps.el.style.top = finalY + 'px';
ps.el.style.width = (ps.w || 380) + 'px';
if (ps.h) ps.el.style.height = ps.h + 'px';
ps.el.style.transform = 'none';
}
function showThoughtPopup(ps, targetWordEl = null) {
clearTimeout(popupHideTimer);
ps.el.classList.add('visible');
if (!ps.pinned) {
ps.el.classList.add('at-top');
THOUGHT_POPUPS.forEach(other => {
if (other.id !== ps.id && !other.pinned && other.el) {
other.el.classList.remove('at-top');
}
});
}
positionThoughtPopup(ps, targetWordEl);
}
function hideThoughtPopup(ps, force = false) {
if (ps.pinned && !force) return;
if (ps.editing) return;
if (!ps.followMode && !force) return;
ps.el.classList.remove('visible');
ps.el.classList.remove('at-top');
if (currentActiveSpan) {
currentActiveSpan.classList.remove('active');
currentActiveSpan = null;
}
}
function destroyThoughtPopup(ps) {
if (ps.el) ps.el.remove();
THOUGHT_POPUPS.delete(ps.id);
if (currentFollowPopupId === ps.id) currentFollowPopupId = null;
repositionPinnedPopups();
}
function repositionPinnedPopups() {
THOUGHT_POPUPS.forEach(ps => {
if (ps.pinned && ps.el && ps.el.classList.contains('visible')) {
positionThoughtPopup(ps);
}
});
}
function attachThoughtPopupEvents(ps) {
const el = ps.el;
el.addEventListener('mouseenter', () => {
clearTimeout(popupHideTimer);
});
el.addEventListener('mouseleave', () => {
if (!ps.pinned && !ps.editing && ps.followMode) {
popupHideTimer = setTimeout(() => hideThoughtPopup(ps), 200);
}
});
el.querySelector('[data-act="follow"]').addEventListener('click', (e) => {
e.stopPropagation();
ps.followMode = !ps.followMode;
e.currentTarget.classList.toggle('active', ps.followMode);
e.currentTarget.title = ps.followMode ? 'Auto-follow mode' : 'Drag state';
if (!ps.followMode) {
const rect = el.getBoundingClientRect();
ps.x = rect.left;
ps.y = rect.top;
}
setStatus(ps.followMode ? '🎯 Follow mode enabled' : '🖱️ Drag state enabled');
});
el.querySelector('[data-act="pin"]').addEventListener('click', (e) => {
e.stopPropagation();
ps.pinned = !ps.pinned;
el.classList.toggle('pinned', ps.pinned);
e.currentTarget.classList.toggle('active', ps.pinned);
e.currentTarget.title = ps.pinned ? 'Unpin' : 'Pin';
if (ps.pinned) {
ps.followMode = false;
const followBtn = el.querySelector('[data-act="follow"]');
if (followBtn) followBtn.classList.remove('active');
const rect = el.getBoundingClientRect();
ps.x = rect.left;
ps.y = rect.top;
repositionPinnedPopups();
}
setStatus(ps.pinned ? '⬆️ Thought popup pinned' : '⬆️ Thought popup unpinned');
});
el.querySelector('[data-act="hide"]').addEventListener('click', (e) => {
e.stopPropagation();
if (ps.editing) exitPopupEditMode(ps, false);
destroyThoughtPopup(ps);
if (currentActiveSpan) {
currentActiveSpan.classList.remove('active');
currentActiveSpan = null;
}
});
el.querySelector('[data-act="edit"]').addEventListener('click', (e) => {
e.stopPropagation();
if (ps.editing) {
exitPopupEditMode(ps, false);
} else {
enterPopupEditMode(ps);
}
});
el.querySelector('.thought-popup-edit-buttons .save').addEventListener('click', (e) => {
e.stopPropagation();
exitPopupEditMode(ps, true);
});
el.querySelector('.thought-popup-edit-buttons .cancel').addEventListener('click', (e) => {
e.stopPropagation();
exitPopupEditMode(ps, false);
});
const fontInput = el.querySelector('[data-fontsize]');
fontInput.addEventListener('input', () => {
ps.fontSize = parseInt(fontInput.value) || 14;
const contentEl = el.querySelector('.thought-popup-content');
if (contentEl) contentEl.style.fontSize = ps.fontSize + 'px';
});
fontInput.addEventListener('change', () => {
ps.fontSize = parseInt(fontInput.value) || 14;
const contentEl = el.querySelector('.thought-popup-content');
if (contentEl) contentEl.style.fontSize = ps.fontSize + 'px';
markProjectUnsaved();
autoSaveProject();
});
const editTA = el.querySelector('.thought-popup-edit-area textarea');
editTA.addEventListener('input', () => {
const card = STATE.thoughtCards.find(c => c.id === ps.cardId);
if (card) {
const thought = card.thoughts.find(t => t.id === ps.thoughtId);
if (thought) {
thought.thought = editTA.value;
markProjectUnsaved();
autoSaveProject();
}
}
});
editTA.addEventListener('keydown', (e) => {
if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
e.preventDefault();
exitPopupEditMode(ps, true);
} else if (e.key === 'Escape') {
e.preventDefault();
exitPopupEditMode(ps, false);
}
});
const header = el.querySelector('[data-drag="true"]');
let dragging = false;
let dragStart = null;
header.addEventListener('mousedown', (e) => {
if (e.target.closest('.thought-popup-controls')) return;
if (e.target.closest('.thought-popup-fontsize')) return;
dragging = true;
const rect = el.getBoundingClientRect();
dragStart = {
mouseX: e.clientX,
mouseY: e.clientY,
popLeft: rect.left,
popTop: rect.top,
};
el.style.transform = 'none';
el.style.left = rect.left + 'px';
el.style.top = rect.top + 'px';
if (ps.followMode) {
ps.followMode = false;
const followBtn = el.querySelector('[data-act="follow"]');
if (followBtn) followBtn.classList.remove('active');
}
e.preventDefault();
});
window.addEventListener('mousemove', (e) => {
if (!dragging) return;
const dx = e.clientX - dragStart.mouseX;
const dy = e.clientY - dragStart.mouseY;
el.style.left = (dragStart.popLeft + dx) + 'px';
el.style.top = (dragStart.popTop + dy) + 'px';
ps.x = dragStart.popLeft + dx;
ps.y = dragStart.popTop + dy;
});
window.addEventListener('mouseup', () => {
dragging = false;
dragStart = null;
});
const resizeHandle = el.querySelector('.thought-popup-resize');
let resizing = false;
let resizeStart = null;
resizeHandle.addEventListener('mousedown', (e) => {
resizing = true;
const rect = el.getBoundingClientRect();
resizeStart = {
mouseX: e.clientX,
mouseY: e.clientY,
popW: rect.width,
popH: rect.height,
};
if (el.style.transform !== 'none') {
el.style.left = rect.left + 'px';
el.style.top = rect.top + 'px';
el.style.transform = 'none';
}
e.preventDefault();
e.stopPropagation();
});
window.addEventListener('mousemove', (e) => {
if (!resizing) return;
const dx = e.clientX - resizeStart.mouseX;
const dy = e.clientY - resizeStart.mouseY;
const newW = Math.max(260, resizeStart.popW + dx);
const newH = Math.max(120, resizeStart.popH + dy);
el.style.width = newW + 'px';
el.style.height = newH + 'px';
ps.w = newW;
ps.h = newH;
});
window.addEventListener('mouseup', () => {
resizing = false;
resizeStart = null;
});
}
function enterPopupEditMode(ps) {
ps.editing = true;
ps.el.classList.add('editing');
const editBtn = ps.el.querySelector('[data-act="edit"]');
editBtn.classList.add('active');
const contentEl = ps.el.querySelector('.thought-popup-content');
const editArea = ps.el.querySelector('.thought-popup-edit-area');
contentEl.style.display = 'none';
editArea.classList.add('visible');
const editTA = editArea.querySelector('textarea');
editTA.focus();
editTA.select();
}
function exitPopupEditMode(ps, save) {
if (save) {
const editTA = ps.el.querySelector('.thought-popup-edit-area textarea');
const card = STATE.thoughtCards.find(c => c.id === ps.cardId);
if (card) {
const thought = card.thoughts.find(t => t.id === ps.thoughtId);
if (thought) {
thought.thought = editTA.value;
ps.el.querySelector('.thought-popup-content').textContent = editTA.value || '(no thought)';
markProjectUnsaved();
autoSaveProject();
setStatus('💭 Thought updated');
}
}
}
ps.editing = false;
ps.el.classList.remove('editing');
const editBtn = ps.el.querySelector('[data-act="edit"]');
editBtn.classList.remove('active');
const contentEl = ps.el.querySelector('.thought-popup-content');
const editArea = ps.el.querySelector('.thought-popup-edit-area');
contentEl.style.display = 'block';
editArea.classList.remove('visible');
}
function handleThoughtSpanHover(span, card) {
const thoughtId = span.dataset.thoughtId;
const thoughtText = span.dataset.thoughtText;
const thought = card.thoughts.find(t => t.id === thoughtId);
if (!thought) return;
if (currentFollowPopupId !== null) {
const prevPs = THOUGHT_POPUPS.get(currentFollowPopupId);
if (prevPs && !prevPs.pinned && !prevPs.editing) {
prevPs.el.classList.remove('visible');
prevPs.el.classList.remove('at-top');
}
}
let existingPinned = null;
for (const ps of THOUGHT_POPUPS.values()) {
if (ps.thoughtId === thoughtId && ps.cardId === card.id && ps.pinned) {
existingPinned = ps;
break;
}
}
if (existingPinned) {
existingPinned.el.classList.add('at-top');
return;
}
let existingFollow = null;
for (const ps of THOUGHT_POPUPS.values()) {
if (ps.thoughtId === thoughtId && ps.cardId === card.id && !ps.pinned && ps.followMode) {
existingFollow = ps;
break;
}
}
if (existingFollow) {
if (currentActiveSpan && currentActiveSpan !== span) {
currentActiveSpan.classList.remove('active');
}
currentActiveSpan = span;
span.classList.add('active');
currentFollowPopupId = existingFollow.id;
existingFollow.word = thoughtText;
updateThoughtPopupContent(existingFollow);
showThoughtPopup(existingFollow, span);
return;
}
if (currentActiveSpan && currentActiveSpan !== span) {
currentActiveSpan.classList.remove('active');
}
currentActiveSpan = span;
span.classList.add('active');
currentFollowPopupId = null;
const popupId = createThoughtPopup(thought, thoughtText, card);
const ps = THOUGHT_POPUPS.get(popupId);
currentFollowPopupId = popupId;
showThoughtPopup(ps, span);
}
function handleThoughtSpanLeave() {
if (currentFollowPopupId !== null) {
const ps = THOUGHT_POPUPS.get(currentFollowPopupId);
if (ps && !ps.pinned && !ps.editing && ps.followMode) {
ps.el.classList.remove('visible');
ps.el.classList.remove('at-top');
}
}
if (currentActiveSpan) {
currentActiveSpan.classList.remove('active');
currentActiveSpan = null;
}
}
// NEW: Click to pin thought popup
function handleThoughtSpanClick(span, card) {
const thoughtId = span.dataset.thoughtId;
const thoughtText = span.dataset.thoughtText;
const thought = card.thoughts.find(t => t.id === thoughtId);
if (!thought) return;

// If there's a current follow popup, pin it
if (currentFollowPopupId !== null) {
const ps = THOUGHT_POPUPS.get(currentFollowPopupId);
if (ps && !ps.pinned) {
ps.pinned = true;
ps.followMode = false;
ps.el.classList.add('pinned');
const pinBtn = ps.el.querySelector('[data-act="pin"]');
if (pinBtn) pinBtn.classList.add('active');
const followBtn = ps.el.querySelector('[data-act="follow"]');
if (followBtn) followBtn.classList.remove('active');
const rect = ps.el.getBoundingClientRect();
ps.x = rect.left;
ps.y = rect.top;
repositionPinnedPopups();
setStatus('⬆️ Thought pinned — click another word to pin more');
return;
}
}

// If no follow popup exists, create one and pin it immediately
let existingPopup = null;
for (const ps of THOUGHT_POPUPS.values()) {
if (ps.thoughtId === thoughtId && ps.cardId === card.id) {
existingPopup = ps;
break;
}
}
if (!existingPopup) {
const popupId = createThoughtPopup(thought, thoughtText, card);
existingPopup = THOUGHT_POPUPS.get(popupId);
}
// Pin it
existingPopup.pinned = true;
existingPopup.followMode = false;
existingPopup.el.classList.add('pinned');

function startResizeAllSides(e, obj, el, direction) {
const startX = e.clientX, startY = e.clientY;
const origX = obj.x, origY = obj.y;
const origW = obj.w || 300, origH = obj.h || 300;
const minW = obj.type === 'circular' ? 350 : (obj.type === 'thought' ? 300 : 180);
const minH = obj.type === 'circular' ? 350 : (obj.type === 'thought' ? 250 : 120);

const dx = (ev.clientX - startX) / STATE.zoom;
const dy = (ev.clientY - startY) / STATE.zoom;
let newX = origX, newY = origY, newW = origW, newH = origH;
if (direction.includes('e')) newW = Math.max(minW, origW + dx);
if (direction.includes('w')) { newW = Math.max(minW, origW - dx); newX = origX + (origW - newW); }
if (direction.includes('s')) newH = Math.max(minH, origH + dy);
if (direction.includes('n')) { newH = Math.max(minH, origH - dy); newY = origY + (origH - newH); }
obj.x = newX; obj.y = newY; obj.w = newW; obj.h = newH;
el.style.left = newX + 'px'; el.style.top = newY + 'px';
el.style.width = newW + 'px'; el.style.height = newH + 'px';
showPixelSize(newW, newH);
}
